name: Deploy UnitX Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
      - 'release/**'
  pull_request:
    branches:
      - main
      - release
      - 'release/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate UnitX static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate site files
        run: |
          test -f unitx/index.html
          test -f unitx/styles.css
          test -f unitx/script.js
          test -d unitx/assets

      - name: Validate referenced assets
        run: |
          while IFS= read -r asset; do
            test -f "unitx/$asset"
          done < <(grep -Eo "assets/[^\"')>[:space:]]+" unitx/index.html unitx/styles.css | cut -d: -f2 | sort -u)

  deploy:
    name: Deploy unitx/index.html
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload UnitX static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: unitx

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report site URL
        run: |
          echo "UnitX site URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
