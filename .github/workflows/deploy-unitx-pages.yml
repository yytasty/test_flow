name: Deploy UnitX Pages

on:
  workflow_dispatch:
  push:
    branches:
      - release

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy unitx/index.html
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate site entry
        run: test -f unitx/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload UnitX static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: unitx

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report site URL
        run: |
          echo "UnitX site URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
